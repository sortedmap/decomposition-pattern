openapi: 3.1.0
info:
  title: API Gateway
  version: 1.0.0
  description: |
    Single entry point for frontend. Routes /api/v1/* to upstream microservices.
    Merge paths from docs/{service}/api.yaml — replace upstream URLs and path prefixes.

servers:
  - url: http://localhost:8080
    description: Local API Gateway

paths:
  /health:
    get:
      summary: Gateway health
      operationId: gatewayHealth
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /api/v1/auth/{proxy+}:
    x-upstream: http://auth-service:3000
    get:
      summary: Proxy to auth-service
      operationId: proxyAuthGet
      parameters:
        - name: proxy
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Proxied response

  /api/v1/catalog/{proxy+}:
    x-upstream: http://catalog-service:3000
    get:
      summary: Proxy to catalog-service
      operationId: proxyCatalogGet
      parameters:
        - name: proxy
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Proxied response

  /api/v1/orders/{proxy+}:
    x-upstream: http://order-service:3000
    get:
      summary: Proxy to order-service
      operationId: proxyOrdersGet
      parameters:
        - name: proxy
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Proxied response

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []
