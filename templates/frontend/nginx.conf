# Frontend nginx — SPA + API reverse proxy
#
# Used in production frontend Docker image. Browser hits {baseUrl}/api/*
# which nginx proxies to api-gateway:8080 on the Docker network.
#
# Smoke tests MUST use the same baseUrl (e.g. http://host:8880), not host :8080.
# proxy_pass has NO trailing slash — preserves /api/... path prefix for gateway.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok"}\n';
    }

    location /api/ {
        proxy_pass http://api-gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
